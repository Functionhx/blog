{{- /*
  暗门入口：在页脚非链接区域 3 秒内连点 5 次，跳转到隐藏的编辑后台 /write/。
  这是可见性层（非真安全），真写权限靠编辑后台里的 GitHub 令牌。
  覆盖主题自带的空 extend_footer.html 钩子（Hugo 0.146+ 项目 _partials 优先于主题）。
*/ -}}
<script>
(function () {
  var TARGET = 5;          // 连点次数
  var WINDOW_MS = 3000;    // 计时窗口
  var ADMIN_URL = '/write/';
  var count = 0, timer = null;
  var footer = document.querySelector('.footer');
  if (!footer) return;
  footer.addEventListener('click', function (e) {
    if (e.target.closest('a')) return; // 不影响页脚里的正常链接
    count++;
    clearTimeout(timer);
    timer = setTimeout(function () { count = 0; }, WINDOW_MS);
    if (count >= TARGET) {
      count = 0;
      window.location.href = ADMIN_URL;
    }
  });
})();
</script>
